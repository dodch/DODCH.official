<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Unavailable | DODCH Official</title>
    <link rel="icon" href="IMG_3352.webp?v=3" type="image/webp">
    <meta name="view-transition" content="same-origin">
    <link rel="stylesheet" href="styles.min.css?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-gold: #D4AF37;
            --text-charcoal: #1a1a1a;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        ::selection {
            background: #000;
            color: #fff;
        }

        ::-moz-selection {
            background: #000;
            color: #fff;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #fff;
            color: var(--text-charcoal);
            font-family: var(--font-sans);
            overflow: hidden;
        }

        .unavailable-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .top-logo {
            position: absolute;
            top: 5vh;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-serif);
            font-size: 1.5rem;
            letter-spacing: 0.4em;
            text-decoration: none;
            color: var(--text-charcoal);
            font-weight: 700;
            z-index: 10;
        }

        .bg-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-serif);
            font-size: 35vw;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.03);
            z-index: 1;
            pointer-events: none;
            filter: blur(10px);
            white-space: nowrap;
            letter-spacing: 0.05em;
            user-select: none;
            line-height: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: clamp(2rem, 6vw, 4.5rem);
            margin: 0 0 1.5rem 0;
            font-weight: 700;
            line-height: 1.1;
            color: var(--text-charcoal);
            letter-spacing: -0.01em;
            white-space: nowrap;
        }

        p {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #666;
            margin: 0 0 3.5rem 0;
            font-weight: 400;
            max-width: 650px;
        }

        .cta-button {
            display: inline-block;
            padding: 1.3rem 4rem;
            background-color: var(--text-charcoal);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.25em;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid var(--text-charcoal);
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .cta-button:hover {
            background-color: #fff !important;
            color: #000 !important;
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border-color: #000 !important;
        }

        .status-badge {
            display: inline-block;
            padding: 0.8rem 2.5rem;
            background-color: rgba(0,0,0,0.05);
            color: #888;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.35em;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            border-radius: 100px;
        }

        @media (max-width: 768px) {
            .bg-watermark { font-size: 65vw; filter: blur(15px); }
            h1 { font-size: 3rem; }
            .top-logo { top: 4vh; font-size: 1.2rem; }
            p { font-size: 1.1rem; padding: 0 10px; }
            .status-badge { padding: 0.6rem 2rem; font-size: 0.65rem; }
        }
    </style>
</head>

<body>
    <main class="unavailable-container">
        <a href="index.html" class="top-logo">DODCH</a>
        
        <div class="bg-watermark">DODCH</div>
        
        <div class="content">
            <span class="status-badge">Collection Update</span>
            <h1>Glass Glow Shampoo</h1>
            <p>We're sorry, but this signature formula has been retired from our permanent collection. We invite you to discover our latest Mediterranean innovations.</p>
            <a href="index.html" class="cta-button">Explore the Collection</a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const content = document.querySelector('.content');
            const watermark = document.querySelector('.bg-watermark');
            const logo = document.querySelector('.top-logo');
            
            // Set initial states
            content.style.opacity = '0';
            content.style.transform = 'translateY(30px)';
            watermark.style.opacity = '0';
            watermark.style.transform = 'translate(-50%, -48%) scale(0.95)';
            logo.style.opacity = '0';
            logo.style.transform = 'translateX(-50%) translateY(-15px)';
            
            // Trigger animation
            setTimeout(() => {
                content.style.transition = 'opacity 1.5s ease, transform 1.2s cubic-bezier(0.165, 0.84, 0.44, 1)';
                content.style.opacity = '1';
                content.style.transform = 'translateY(0)';
                
                watermark.style.transition = 'opacity 2.5s ease, transform 2.5s cubic-bezier(0.165, 0.84, 0.44, 1)';
                watermark.style.opacity = '1';
                watermark.style.transform = 'translate(-50%, -50%) scale(1)';

                logo.style.transition = 'opacity 1s ease, transform 1s cubic-bezier(0.165, 0.84, 0.44, 1)';
                logo.style.opacity = '1';
                logo.style.transform = 'translateX(-50%) translateY(0)';
            }, 300);
        });
    </script>
</body>

</html>
