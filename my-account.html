<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | DODCH</title>
    <link rel="icon" href="favicon-solid-white.png?v=6" type="image/png">
    <link rel="apple-touch-icon" href="IMG_3355.webp?v=4">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="view-transition" content="same-origin">
</head>

<body>
    <!-- Desktop Sidebar -->
    <aside id="desktop-sidebar">
        <button class="sidebar-close-btn">&times;</button>
        <div class="sidebar-header">
            <div class="profile-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" style="width: 30px; height: 30px;">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <span id="sidebar-user-name">Guest</span>
            <button id="sidebar-login-btn">Login</button>
        </div>
        <nav class="sidebar-menu">
            <a href="index.html">Shop</a>
            <a href="#contact">Contact</a>
        </nav>
        <div class="sidebar-bottom">
            <button id="sidebar-logout-btn" style="display: none;">Logout</button>
        </div>
    </aside>
    <div class="sidebar-overlay"></div>

    <div id="custom-cursor"></div>
    <div id="scroll-progress"></div>

    <!-- Navigation -->
    <nav id="navbar" class="scrolled">
        <div class="nav-container">
            <div class="hamburger">
                <span style="background-color: var(--text-charcoal);"></span>
                <span style="background-color: var(--text-charcoal);"></span>
                <span style="background-color: var(--text-charcoal);"></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" style="color: var(--text-charcoal);">Shop</a></li>
                <li><a href="#contact" style="color: var(--text-charcoal);">Contact</a></li>
                <li><a href="#" id="login-btn" style="color: var(--text-charcoal);"><svg class="nav-icon"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg><span class="login-text">Login</span>
                    </a></li>
                <li class="nav-search-item">
                    <div class="search-container">
                        <input type="text" id="navbar-search-input" class="search-input" placeholder="Search...">
                        <button id="search-toggle-btn" aria-label="Search"><svg class="nav-icon" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg></button>
                    </div>
                </li>
                <li><a href="#" id="cart-toggle" style="color: var(--text-charcoal);">
                        <svg class="nav-icon" viewBox="0 0 24 24">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span id="cart-count-badge">0</span>
                    </a></li>
            </ul>
            <a href="index.html" class="logo">DODCH</a>
        </div>
    </nav>

    <main>
        <div class="account-container">
            <div class="account-header reveal">
                <h1>My Account</h1>
                <p>Welcome back, <span id="account-user-name">Guest</span>.</p>
            </div>

            <div class="account-tabs">
                <button class="account-tab-btn active" data-tab="orders">
                    <span class="tab-label-full">Order History</span>
                    <span class="tab-label-short">Orders</span>
                </button>
                <button class="account-tab-btn" data-tab="reviews">
                    <span class="tab-label-full">My Reviews</span>
                    <span class="tab-label-short">Reviews</span>
                </button>
                <button class="account-tab-btn" data-tab="shipping">
                    <span class="tab-label-full">My Shipping Info</span>
                    <span class="tab-label-short">Addresses</span>
                </button>
            </div>

            <div class="account-tabs-content">
                <!-- Orders Tab -->
                <div id="orders-tab-content" class="tab-content active">
                    <div class="order-history-section reveal">
                        <div class="order-filter-controls">
                            <div class="sort-wrapper">
                                <div class="account-select-group">
                                    <div class="select-container">
                                        <label for="order-sort-date">Sort by Date</label>
                                        <select id="order-sort-date" class="account-select">
                                            <option value="newest">Newest First</option>
                                            <option value="oldest">Oldest First</option>
                                        </select>
                                    </div>
                                    <div class="select-container">
                                        <label for="order-filter-status">Order Status</label>
                                        <select id="order-filter-status" class="account-select">
                                            <option value="all">All Orders</option>
                                            <option value="Pending">Pending</option>
                                            <option value="Confirmed">Confirmed</option>
                                            <option value="Shipped">Shipped</option>
                                            <option value="Delivered">Delivered</option>
                                            <option value="Cancelled">Cancelled</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div id="orders-loader" class="account-loader">
                            <div class="skeleton-order"></div>
                            <div class="skeleton-order"></div>
                        </div>

                        <div id="orders-list" class="content-fade">
                            <p>Please login to view your order history.</p>
                        </div>

                        <div id="load-more-orders-container"
                            style="display: none; justify-content: center; margin-top: 2rem;">
                            <button id="load-more-orders-btn" class="classic-btn" style="padding: 0.8rem 2rem;">View
                                More Orders</button>
                        </div>
                    </div>
                </div>

                <!-- Reviews Tab -->
                <div id="reviews-tab-content" class="tab-content">
                    <div class="reviews-history-section reveal">
                        <div id="reviews-loader" class="account-loader">
                            <div class="skeleton-review"></div>
                            <div class="skeleton-review"></div>
                        </div>

                        <div id="user-reviews-list" class="content-fade">
                            <p style="color: #666; font-style: italic;">No reviews found.</p>
                        </div>

                        <div id="load-more-reviews-container"
                            style="display: none; justify-content: center; margin-top: 2rem;">
                            <button id="load-more-reviews-btn" class="classic-btn" style="padding: 0.8rem 2rem;">View
                                More Reviews</button>
                        </div>
                    </div>
                </div>

                <!-- Shipping Tab — fully populated by initShippingInfo() -->
                <div id="shipping-tab-content" class="tab-content">
                    <div class="shipping-info-section reveal" style="max-width: 600px; margin: 0 auto;">
                        <div id="account-shipping-root">
                            <div class="account-loader" style="margin-top: 2rem;">
                                <div class="skeleton-order"></div>
                                <div class="skeleton-order" style="margin-top: 0.75rem;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer></footer>

    <!-- Cart Drawer -->
    <div id="cart-overlay"></div>
    <div id="cart-drawer">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button id="close-cart-btn" class="close-btn">&times;</button>
        </div>
        <div class="cart-body" id="cart-items-container">
            <div class="cart-empty">
                <p>Your cart is empty.</p>
            </div>
        </div>
        <div class="cart-footer">
            <div class="subtotal-row"><strong>Subtotal</strong><span id="cart-subtotal">0.00 TND</span></div>
            <a href="checkout.html" class="cta-button checkout-btn">Proceed to Checkout</a>
        </div>
    </div>

    <script src="https://unpkg.com/lenis@1.1.2/dist/lenis.min.js"></script><script type="module" src="script.js?v=5"></script>
</body>

</html>
