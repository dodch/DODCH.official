# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build and deploy job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Deployment Directory
        run: |
          mkdir -p deploy
          # 1. Deploy Next.js output first
          if [ -d "out" ]; then cp -r out/* deploy/; fi
          
          # 2. Deploy root-level static files (catch all images, icons, and videos)
          # We use a robust find command to copy all top-level files except hidden ones or package files
          find . -maxdepth 1 -type f ! -name ".*" ! -name "package*" ! -name "tsconfig.json" ! -name "next.config.mjs" ! -name "postcss.config.js" -exec cp {} deploy/ \;
          
          # 3. Deploy important folders
          if [ -d "images" ]; then cp -r images deploy/; fi
          if [ -d "assets" ]; then cp -r assets deploy/; fi
          if [ -d "HairTypes" ]; then cp -r HairTypes deploy/; fi
          if [ -d "components" ]; then cp -r components deploy/; fi
          
          # 4. Ensure .nojekyll exists
          touch deploy/.nojekyll
          # Ensure .nojekyll exists so _next folder isn't ignored by GitHub Pages
          touch deploy/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
