name: Sync Product Feed & Auto-Deploy

on:
  schedule:
    - cron: '0 0 * * *' # Run automatically every day at 12:00 AM UTC
  workflow_dispatch: # Allows you to trigger this workflow manually from GitHub Actions UI

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install only required build tools
        run: npm install esbuild firebase-admin --no-save

      - name: 🔄 Sync prices from Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node sync-db.js

      - name: 🏗️ Build and regenerate products.xml
        run: node build.js

      - name: 🚀 Authenticate and Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          npx firebase-tools deploy --only hosting --non-interactive

