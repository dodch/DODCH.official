name: Sync Product Feed & Auto-Deploy

on:
  schedule:
    - cron: '0 0 * * *' # Run automatically every day at 12:00 AM UTC
  workflow_dispatch: # Allows you to trigger this workflow manually from GitHub Actions UI

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push updated prices.json and products.xml back to the repository
    steps:

      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install only required build tools
        run: npm install esbuild firebase-admin --no-save

      - name: 🔄 Sync prices from Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node sync-db.js

      - name: 🏗️ Build and regenerate products.xml
        run: node build.js

      - name: 💾 Commit and push updated feed back to GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add prices.json products.xml
          git commit -m "chore: auto-sync database prices and update feed" || echo "No changes to commit"
          git push origin main
          echo "✅ Push complete — GitHub Pages will now rebuild dodch.com with the new prices."

