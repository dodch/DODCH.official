<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | DODCH Official Store</title>
    <link rel="icon" href="IMG_3352.webp?v=3" type="image/webp" media="(prefers-color-scheme: light)">
    <link rel="icon" href="IMG_3355.webp?v=3" type="image/webp" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="IMG_3355.webp?v=3">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="view-transition" content="same-origin">
</head>

<body>
    <!-- Desktop Sidebar -->
    <aside id="desktop-sidebar">
        <button class="sidebar-close-btn">&times;</button>
        <div class="sidebar-header">
            <div class="profile-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" style="width: 30px; height: 30px;">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <span id="sidebar-user-name">Guest</span>
            <button id="sidebar-login-btn">Login</button>
        </div>
        <nav class="sidebar-menu">
            <a href="index.html">Shop</a>
            <a href="#contact">Contact</a>
        </nav>
        <div class="sidebar-bottom">
            <button id="sidebar-logout-btn" style="display: none;">Logout</button>
        </div>
    </aside>
    <div class="sidebar-overlay"></div>

    <div id="scroll-progress"></div>



    <!-- Navigation -->
    <nav id="navbar" class="scrolled">
        <div class="nav-container">
            <div class="hamburger">
                <span style="background-color: var(--text-charcoal);"></span>
                <span style="background-color: var(--text-charcoal);"></span>
                <span style="background-color: var(--text-charcoal);"></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" style="color: var(--text-charcoal);">Shop</a></li>

                <li><a href="#contact" style="color: var(--text-charcoal);">Contact</a></li>
                <li><a href="#" id="login-btn" style="color: var(--text-charcoal);">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg><span class="login-text">Login</span>
                    </a></li>
                <li class="nav-search-item">
                    <div class="search-container">
                        <input type="text" id="navbar-search-input" class="search-input" placeholder="Search...">
                        <button id="search-toggle-btn" aria-label="Search"><svg class="nav-icon" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg></button>
                    </div>
                </li>
                <li><a href="#" id="cart-toggle" style="color: var(--text-charcoal);">
                        <svg class="nav-icon" viewBox="0 0 24 24">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span id="cart-count-badge">0</span>
                    </a></li>
            </ul>
            <a href="index.html" class="logo">DODCH</a>
        </div>
    </nav>

    <main>
        <div class="checkout-container">
            <!-- Left Column: Shipping Info -->
            <div class="checkout-form reveal">
                <h2>Shipping Information</h2>
                <form>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="checkout-email" placeholder="nom@exemple.tn" required>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="checkout-name" placeholder="Nom Complet" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number (Tunisia)</label>
                        <input type="tel" id="checkout-phone" placeholder="8 digits (e.g. 21654321)" required pattern="[24579][0-9]{7}">
                        <small style="opacity: 0.6; font-size: 0.8rem;">Must be 8 digits starting with 2, 4, 5, 7, or 9.</small>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="checkout-address" placeholder="Rue, Appartement, Bureau..." required>
                    </div>
                    <div class="form-group">
                        <label>Governorate (Gouvernorat)</label>
                        <select id="checkout-city" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); background: #fff; font-family: inherit;">
                            <option value="" disabled selected>Select your region</option>
                            <option value="Ariana">Ariana</option>
                            <option value="Béja">Béja</option>
                            <option value="Ben Arous">Ben Arous</option>
                            <option value="Bizerte">Bizerte</option>
                            <option value="Gabès">Gabès</option>
                            <option value="Gafsa">Gafsa</option>
                            <option value="Jendouba">Jendouba</option>
                            <option value="Kairouan">Kairouan</option>
                            <option value="Kasserine">Kasserine</option>
                            <option value="Kebili">Kébili</option>
                            <option value="Kef">Le Kef</option>
                            <option value="Mahdia">Mahdia</option>
                            <option value="Manouba">Manouba</option>
                            <option value="Medenine">Médenine</option>
                            <option value="Monastir">Monastir</option>
                            <option value="Nabeul">Nabeul</option>
                            <option value="Sfax">Sfax</option>
                            <option value="Sidi Bouzid">Sidi Bouzid</option>
                            <option value="Siliana">Siliana</option>
                            <option value="Sousse">Sousse</option>
                            <option value="Tataouine">Tataouine</option>
                            <option value="Tozeur">Tozeur</option>
                            <option value="Tunis">Tunis</option>
                            <option value="Zaghouan">Zaghouan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Postal Code</label>
                        <input type="text" id="checkout-postal-code" placeholder="Code Postal (e.g. 1000)" required>
                    </div>
                    
                    <div class="form-group checkbox-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem;">
                        <input type="checkbox" id="save-shipping-info" style="width: auto;">
                        <label for="save-shipping-info" style="margin-bottom: 0;">Save delivery info to my profile</label>
                    </div>
                </form>
            </div>

            <!-- Right Column: Order Summary -->
            <div class="order-summary reveal">
                <h2>Order Summary</h2>
                <div id="checkout-items-container">
                    <!-- Items injected via JS -->
                </div>

                <div class="summary-totals">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="checkout-subtotal">0.00 TND</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span id="checkout-shipping">7.00 TND</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="checkout-total">0.00 TND</span>
                    </div>
                </div>

                <button class="place-order-btn" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;" aria-label="Confirm and place your order">
                    <svg class="truck-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                        <rect x="1" y="3" width="15" height="13"></rect>
                        <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                        <circle cx="5.5" cy="18.5" r="2.5"></circle>
                        <circle cx="18.5" cy="18.5" r="2.5"></circle>
                    </svg>
                    Place Order
                </button>
            </div>
        </div>
    </main>

    <footer></footer>

    <!-- Cart Drawer (Hidden but functional for consistency) -->
    <div id="cart-overlay"></div>
    <div id="cart-drawer">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button id="close-cart-btn" class="close-btn">&times;</button>
        </div>
        <div class="cart-body" id="cart-items-container"></div>
        <div class="cart-footer">
            <div class="subtotal-row"><strong>Subtotal</strong><span id="cart-subtotal">0.00 TND</span></div>
            <a href="checkout.html" class="cta-button checkout-btn">Proceed to Checkout</a>
        </div>
    </div>

    <script src="https://unpkg.com/lenis@1.1.2/dist/lenis.min.js"></script><script type="module" src="script.js?v=5"></script>
</body>

</html>
